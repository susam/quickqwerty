<!DOCTYPE html>

  <head>
    <title>QuickQWERTY - Touch Typing Tutor</title>
    <meta charset="UTF-8">
    <style>

    <script>
      const TARGET_TEXT_LENGTH = 25

      function commonChars (a, b) {
        const minLength = Math.min(a.length, b.length)
        let i
        for (i = 0; i < minLength; i++) {
          if (a.charAt(i) !== b.charAt(i)) {
            return i
          }
        }
        return i
      }

      function randomInt (a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a
      }

      function randomItem (a) {
        return a[Math.floor(Math.random() * a.length)]
      }

      function prettyTime (ms) {
        return (ms / 1000).toFixed(3) + ' s'
      }

      function visual (s) {
        // TODO: Why is all this magic required?
        return s.replace(/ /g, '\u00a0').replace(/\n/g, '\u23ce')
      }

      function addChildren () {
        // TODO: Can this be simplified?
        if (arguments.length <= 1) {
          return
        }
        const node = arguments[0]
        const childNodes = Array.prototype.slice.call(arguments, 1)
        let childNode
        let i
        for (i = 0; i < childNodes.length; i++) {
          childNode = childNodes[i]

          if (childNode instanceof window.Node) {
            node.appendChild(childNode)
          } else {
            node.appendChild(document.createTextNode(childNode + ''))
          }
        }
      }

      function removeChildren (node) {
        while (node.firstChild) {
          node.removeChild(node.firstChild)
        }
      }

      function setChildren () {
        if (arguments.length <= 1) {
          return
        }
        removeChildren(arguments[0])
        addChildren.apply(null, arguments)
      }

      let unitLinks, subunitLinks, altUnitLinks
      let unitTitle
      let guideLink, guide
      let practicePanelWrapper
      let practicePane
      let previousLink, nextLink
      let target
      let input
      let status
      let remark
      let advice
      let progress
      let progressBar
      let progressPercent
      let restartLink
      let speed
      let error

      let chosenUnit
      let unitNo
      let subunitNo
      let unit
      let subunitTitles
      let subunitText
      let targetPrefix
      let targetChar
      let targetSuffix
      let startTime
      let errors
      let correctInputLength
      let timeElapsed
      let wpm
      let cpm
      let errorRate
      let state

      const LOGGING = true

      const ALT = 'alt'
      const MAIN = 'main'

      const READY = 'ready'
      const RUNNING = 'running'
      const ERROR = 'error'
      const COMPLETED = 'completed'

      const VERY_HAPPY = '(\uff61\u0298\u203f\u0298\uff61)'
      const HAPPY = '(\u0298\u203f\u0298)'
      const UNHAPPY = '(\u2299_\u2299)'
      const SAD = '(\u2299\u2054\u2299)'

      function init () {
        unitLinks = document.getElementById('unitLinks')
        subunitLinks = document.getElementById('subunitLinks')
        loadSettings()
        showPracticePanelWrapper()
        updateUnitFromURL()
        hideGuide()
        window.addEventListener('hashchange', readHash)
        input.addEventListener('keyup', updatePracticePane)
        guideLink.addEventListener('click', toggleGuide)
      }

      function log () {
        if (LOGGING) {
          const args = Array.prototype.slice.call(arguments)
          console.log('[log] ' + args.join(' '))
        }
      }

      function loadSettings () {
        if (typeof window.localStorage.unit !== 'undefined') {
          chosenUnit = window.localStorage.unit
        } else {
          chosenUnit = MAIN
        }
      }

      function pickUnit (m) {
        if (altUnitAvailable(m) && chosenUnit === ALT) {
          return Units.alt[m - Units.altStart]
        } else {
          return Units.main[m - 1]
        }
      }

      function altUnitAvailable (m) {
        return (m >= Units.altStart && m < Units.altStart + Units.alt.length)
      }

      function showPracticePanelWrapper () {
        practicePanelWrapper.style.display = 'inline-block'
      }

      function displayUnitLinks () {
        const linksDiv = unitLinks
        removeChildren(linksDiv)

        for (let i = 0; i < Units.main.length; i++) {
          const label = 'Unit ' + (i + 1)
          const selected = (i + 1 === unitNo)
          const href = unitHref(i + 1)

          const divElement = boxedLink(label, selected, href)
          divElement.id = 'unit' + (i + 1)
          divElement.title = pickUnit(i + 1).title

          linksDiv.appendChild(divElement)
        }
      }

      function boxedLink (label, selected, href, clickHandler) {
        const divElement = document.createElement('div')
        if (selected) {
          const spanElement = document.createElement('span')
          addChildren(spanElement, label)
          divElement.appendChild(spanElement)

          divElement.className = 'selected'
        } else {
          const anchorElement = document.createElement('a')
          anchorElement.href = href
          addChildren(anchorElement, label)

          if (typeof clickHandler !== 'undefined') {
            anchorElement.onclick = clickHandler
          }
          divElement.appendChild(anchorElement)
        }
        return divElement
      }

      function unitHref (m, n) {
        if (typeof m === 'undefined') {
          return ''
        } else if (typeof n === 'undefined') {
          return '#' + m
        } else {
          return '#' + m + '.' + n
        }
      }

      function readHash () {
        switch (window.location.hash) {
          case '#restart':
            currentSubunit()
            break

          case '#previous':
            previousSubunit()
            break

          case '#next':
            nextSubunit()
            break

          default:
            updateUnitFromURL()
        }
      }

      function currentSubunit () {
        const m = unitNo
        const n = subunitNo
        window.location.href = unitHref(m, n)
      }

      function currentSubunitIsTheFirstSubunit () {
        return unitNo === 1 && subunitNo === 1
      }

      function currentSubunitIsTheLastSubunit () {
        return unitNo === Units.main.length &&
          subunitNo === subunitTitles.length
      }

      function previousSubunit () {
        let m = unitNo
        let n = subunitNo
        if (!currentSubunitIsTheFirstSubunit()) {
          if (n === 1) {
            // If the user is at unit M.1, go to unit (M - 1).L
            // where L is the last subunit of the previous unit.
            const previousUnit = pickUnit(m - 1)
            const previousSubunitTitles = []
            for (const subunitTitle in previousUnit.subunits) {
              previousSubunitTitles.push(subunitTitle)
            }

            m--
            n = previousSubunitTitles.length
          } else {
            // If the user is at unit M.N, go to unit M.(N - 1)
            n--
          }
        }
        window.location.href = unitHref(m, n)
      }

      function nextSubunit () {
        let m = unitNo
        let n = subunitNo

        if (!currentSubunitIsTheLastSubunit()) {
          if (n === subunitTitles.length) {
            // If the user is at unit M.L where L is the last
            // subunit of unit M, then go to unit (M + 1).1.
            m++
            n = 1
          } else {
            // If the user is at unit M.N, then go to unit M.(N + 1).
            n++
          }
        }
        window.location.href = unitHref(m, n)
      }

      function hideGuide () {
        guide.style.display = 'none'
        setChildren(guideLink, 'Guide')
        return false
      }

      function showGuide () {
        guide.style.display = ''
        setChildren(guideLink, 'Hide Guide')
        return false
      }

      function toggleGuide () {
        if (guide.style.display === 'none') {
          return showGuide()
        } else {
          return hideGuide()
        }
      }

      function updateUnitFromURL () {
        // Default lesson is Unit 1.1
        let unitNo = 1
        let subunitNo = 1

        // Parse the fragment identifier in the URL and determine the
        // unit
        if (window.location.hash.length > 0) {
          const fragmentID = window.location.hash.slice(1)
          const tokens = fragmentID.split('.')
          unitNo = parseInt(tokens[0])
          if (tokens.length > 1) { subunitNo = parseInt(tokens[1]) }
        }

        // Default to unit 1 if unit number could not be parsed
        // correctly from the URL
        if (isNaN(unitNo)) {
          unitNo = 1
        }

        // Default to subunit 1 if unit number could not be parsed
        // correctly from the URL
        if (isNaN(subunitNo)) {
          subunitNo = 1
        }

        setSubunit(unitNo, subunitNo)

        displayUnitLinks()
        displaySubunitLinks()
        displayAltUnitLinks()
        updateNavigationLinks()
        updateProgressTooltip()

        displayUnitTitle()
        displayGuide()

        resetSubunit()
      }

      function updateNavigationLinks () {
        if (currentSubunitIsTheFirstSubunit()) {
          previousLink.style.visibility = 'hidden'
          nextLink.style.visibility = 'visible'
        } else if (currentSubunitIsTheLastSubunit()) {
          previousLink.style.visibility = 'visible'
          nextLink.style.visibility = 'hidden'
        } else {
          previousLink.style.visibility = 'visible'
          nextLink.style.visibility = 'visible'
        }
      }

      function updateProgressTooltip () {
        progress.title =
          'This lesson contains ' + subunitText.length +
          ' characters.'
      }

      function displayAltUnitLinks () {
        // If alternate unit is not available for the current unit,
        // hide the alternate links element
        if (!altUnitAvailable(unitNo)) {
          altUnitLinks.style.visibility = 'hidden'
          return
        }

        // Delete all existing alternate unit links
        removeChildren(altUnitLinks)

        // Create div elements for the main unit and alternate unit
        const mainUnitElement = boxedLink(
          Units.mainLabel, chosenUnit === MAIN, '#', toggleUnit
        )

        const altUnitElement = boxedLink(
          Units.altLabel, chosenUnit === ALT, '#', toggleUnit
        )

        altUnitLinks.appendChild(mainUnitElement)
        altUnitLinks.appendChild(altUnitElement)
        altUnitLinks.style.visibility = 'visible'
      }

      function toggleUnit () {
        let newUnit
        let confirmMessage

        if (chosenUnit === MAIN) {
          newUnit = ALT
          confirmMessage = Units.altConfirmMessage
        } else {
          newUnit = MAIN
          confirmMessage = Units.mainConfirmMessage
        }

        if (!window.confirm(confirmMessage)) {
          return false
        }

        window.localStorage.unit = newUnit
        loadSettings()
        updateUnitFromURL()
        return false
      }

      function resetSubunit () {
        state = READY
        errors = 0
        input.value = ''

        log(
          'state', state.toUpperCase(),
          'unit', unitNo + '.' + subunitNo,
          'type', chosenUnit
        )

        updatePracticePaneState()
        updatePracticePane()
        clearAdvice()
        clearResultTooltips()
      }

      function setSubunit (m, n) {
        unitNo = m
        subunitNo = n

        unit = pickUnit(m)

        subunitTitles.length = 0
        for (const subunitTitle in unit.subunits) {
          subunitTitles.push(subunitTitle)
        }

        const subunitTitle = subunitTitles[n - 1]
        subunitText = unit.subunits[subunitTitle]
      }

      function displaySubunitLinks () {
        // Delete all existing subunit links
        const linksDiv = subunitLinks
        while (linksDiv.firstChild &&
               linksDiv.firstChild.className !== 'stretch') {
          linksDiv.removeChild(linksDiv.firstChild)
        }

        // Create new subunit links for the unit m
        const numberOfSubunits = subunitTitles.length
        for (let i = numberOfSubunits - 1; i >= 0; i--) {
          // Insert whitespaces between div elements, otherwise they
          // would not be justified
          const whitespace = document.createTextNode('\n')
          linksDiv.insertBefore(whitespace, linksDiv.firstChild)

          const label = subunitTitles[i]
          const selected = (i + 1 === subunitNo)
          const href = unitHref(unitNo, i + 1)

          const subunitDiv = boxedLink(label, selected, href)
          subunitDiv.id = 'subunit' + (i + 1)
          subunitDiv.style.width = (95 / numberOfSubunits) + '%'

          linksDiv.insertBefore(subunitDiv, linksDiv.firstChild)
        }
      }

      function displayUnitTitle () {
        // Parts of the unit title
        const unitNoDisplay = 'Unit ' + unitNo +
              '.' + subunitNo
        const space = '\u00a0\u00a0'
        const title = '[' + unit.title + ']'

        setChildren(unitTitle, unitNoDisplay, space, title)
      }

      function displayGuide () {
        guide.innerHTML = unit.guide
      }

      function setTargetText () {
        // The target text should display at least one character
        let targetLength = TARGET_TEXT_LENGTH
        if (targetLength < 1) {
          targetLength = 1
        }

        // Length of the target text should be odd as equal number of
        // characters should be displayed on either side of the
        // character to be typed
        if (targetLength % 2 === 0) {
          targetLength--
        }

        // Number of characters on either side of the character to be
        // typed, assuming that the character to be typed is at the
        // centre
        const prefixLength = (targetLength - 1) / 2

        // Calculate the start index and the end index of the substring
        // to be selected from the subunit text to display as the target
        // text
        const i = correctInputLength
        const textLength = subunitText.length
        let startIndex
        if (i <= prefixLength) {
          startIndex = 0
        } else if (i >= textLength - 1 - prefixLength) {
          startIndex = textLength - targetLength
        } else {
          startIndex = i - prefixLength
        }
        const endIndex = startIndex + targetLength

        // Select prefix string
        let s = subunitText.substring(startIndex, i)
        targetPrefix = visual(s)

        // Select target character
        if (i < textLength) {
          s = subunitText.charAt(i)
          targetChar = visual(s)
        } else {
          targetChar = ''
        }

        // Select suffix string
        s = subunitText.substring(i + 1, endIndex)
        targetSuffix = visual(s)
      }

      function displayTargetText () {
        // Create target character element
        const targetCharElement = document.createElement('span')
        const targetCharTextNode = document.createTextNode(targetChar)
        targetCharElement.className = 'targetChar'
        targetCharElement.appendChild(targetCharTextNode)

        // Set new target text
        setChildren(
          target,
          targetPrefix,
          targetCharElement,
          targetSuffix
        )
      }

      function updatePracticePane () {
        evaluateInput()
        setTargetText()
        displayTargetText()
        updateProgress()
        updateSpeed()
        updateError()
        updateSmiley()

        if (state === COMPLETED) {
          displayAdvice()
          setResultTooltips()

          log(
            'state', state.toUpperCase(),
            'unit', unitNo + '.' + subunitNo,
            'type', chosenUnit,
            'wpm', wpm,
            'error', errorRate.toFixed(1)
          )
        }
      }

      function evaluateInput () {
        const inputText = input.value
        const inputLength = inputText.length

        // If the tutor is in READY state, and input has been entered,
        // then set it to RUNNING STATE.
        if (state === READY && inputLength > 0) {
          startTime = new Date().getTime()
          state = RUNNING
          updatePracticePaneState()

          log(
            'state', state.toUpperCase(),
            'unit', unitNo + '.' + subunitNo,
            'type', chosenUnit
          )
        }

        // Number of characters correctly typed by the user
        const goodChars = commonChars(subunitText, inputText)
        correctInputLength = goodChars

        // Validate the input
        if (goodChars === inputLength) {
          // Clear error if any
          if (state === ERROR) {
            state = RUNNING
            updatePracticePaneState()
          }
        } else {
          // Set and display error
          if (state === RUNNING) {
            state = ERROR
            errors++
            updatePracticePaneState()
          } else if (state === ERROR) {
            processInputCommand()
          }
        }

        // Update error rate
        if (goodChars === 0) {
          if (errors === 0) {
            errorRate = 0
          } else {
            errorRate = Number.POSITIVE_INFINITY
          }
        } else {
          errorRate = 100 * errors / goodChars
        }

        // Check if the complete target text has been typed successfully
        if (goodChars === subunitText.length) {
          state = COMPLETED
          updatePracticePaneState()
        }
      }

      function updatePracticePaneState () {
        switch (state) {
          case READY:
            practicePane.className = ''
            input.disabled = false
            input.focus()
            setChildren(status, 'READY')
            status.title = 'Type in the input box below ' +
              'to begin this lesson.'
            restartLink.style.visibility = 'hidden'
            break

          case RUNNING:
            practicePane.className = ''
            input.disabled = false
            input.focus()
            setChildren(status, '')
            status.title = ''
            restartLink.style.visibility = 'visible'
            break

          case ERROR:
            practicePane.className = 'error'
            input.disabled = false
            input.focus()
            restartLink.style.visibility = 'visible'
            setChildren(status, 'ERROR!')
            status.title = 'Fix errors in the input box ' +
              'by pressing the backspace key.'
            break

          case COMPLETED:
            practicePane.className = 'completed'
            input.disabled = true
            input.blur()
            restartLink.style.visibility = 'visible'
            setChildren(status, 'COMPLETED')
            status.title = 'You have completed this lesson.'
            break
        }
      }

      function clearAdvice () {
        removeChildren(remark)
        removeChildren(advice)
      }

      function displayAdvice () {
        // Calculate error rate (in percent)
        const error = Math.round(errorRate)

        const repeatSubunit = error > 0

        // Update remark and advice
        const anchorElement = document.createElement('a')
        if (repeatSubunit) {
          addChildren(remark, 'Reduce error')
          remark.title = 'Your error rate should not ' +
            'exceed 0%.'

          addChildren(anchorElement, 'Try again')
          anchorElement.href = '#restart'
          anchorElement.title = 'Please practice this lesson again.'
        } else {
          addChildren(remark, 'Well done!')
          remark.title = 'You have satisfactorily ' +
            'completed this lesson.'

          addChildren(anchorElement, 'Next lesson')
          anchorElement.href = '#next'
          anchorElement.title = 'Please proceed with the next lesson.'
        }

        // Do not display 'Next lesson' advice if the user is at the
        // last subunit; display advice otherwise
        if (repeatSubunit || !currentSubunitIsTheLastSubunit()) {
          advice.appendChild(anchorElement)
          anchorElement.focus()
        }
      }

      function updateProgress () {
        const goodChars = correctInputLength
        const textLength = subunitText.length

        const progress = Math.round(100 * goodChars / textLength)

        progressBar.value = progress
        setChildren(progressPercent, progress + '%')
      }

      function updateSpeed () {
        // WPM and CPM does not need to be calculated on error
        if (state === ERROR) {
          return
        }

        const goodChars = correctInputLength

        // Determine the time elapsed since the user began typing
        const currentTime = new Date().getTime()
        const timeElapsed = currentTime - startTime

        // Calculate WPM and CPM
        let wpm
        if (timeElapsed === 0) {
          wpm = goodChars === 0 ? 0 : '\u221e'
        } else {
          wpm = Math.round(60000 * goodChars / 5 / timeElapsed)
          cpm = Math.round(60000 * goodChars / timeElapsed)
        }

        // Display WPM
        setChildren(speed, wpm + ' wpm')
      }

      function updateError () {
        let errorRateDisplay

        // Update error rate
        if (errorRate === Number.POSITIVE_INFINITY) {
          errorRateDisplay = '\u221e'
        } else {
          errorRateDisplay = Math.round(errorRate)
        }

        // Display error rate
        setChildren(error, errorRateDisplay + '% error')
      }

      function updateSmiley () {
        const roundedErrorRate = Math.round(errorRate)
        let smiley

        if (roundedErrorRate === 0) {
          if (wpm >= 40) {
            smiley = VERY_HAPPY
          } else {
            smiley = HAPPY
          }
        } else if (roundedErrorRate > 0 && roundedErrorRate <= 2) {
          smiley = UNHAPPY
        } else {
          smiley = SAD
        }
        setChildren(smiley, smiley)
      }

      function clearResultTooltips () {
        speed.title = ''
        error.title = ''
      }

      function setResultTooltips () {
        const textLength = subunitText.length
        const charNoun = textLength === 1 ? 'character' : 'characters'

        // Speed tooltip
        speed.title =
          'You have typed ' + textLength + ' ' + charNoun +
          ' in\n' +
          prettyTime(timeElapsed) + '.\n\n' +
          'Your typing speed is\n' +
          wpm + ' words per minute, or\n' +
          cpm + ' characters per minute.'

        // Error rate tooltip
        let errorRateTooltip
        let accuracyTooltip

        // Update error rate
        if (errorRate === Number.POSITIVE_INFINITY) {
          errorRateTooltip = '\u221e'
          accuracyTooltip = 0
        } else {
          errorRateTooltip = parseFloat(errorRate.toFixed(1))
          accuracyTooltip = 100 - errorRateTooltip
        }

        const errorNoun = errors === 1 ? 'error' : 'errors'

        const title =
              'You have typed ' + textLength + ' ' + charNoun +
              '.\n' +
              'You have made ' + errors + ' ' +
              errorNoun + '.\n' +
              'Your error rate is ' + errorRateTooltip + '%.\n' +
              'Your accuracy is ' + accuracyTooltip + '%.\n'

        error.title = title
      }

      function processInputCommand () {
        const inputText = input.value
        const goodChars = correctInputLength

        if (inputCommandIs('restart') || inputCommandIs('rst')) {
          window.location.href = '#restart'
        } else if (inputCommandIs('fix') || inputCommandIs('xxx')) {
          input.value = inputText.substring(0, goodChars)
          updatePracticePane()
        } else if (inputCommandIs('qtpi')) {
          qtpi()
        }
      }

      function inputCommandIs (command) {
        const value = input.value
        return value.substring(value.length - command.length) === command
      }

      function createHeart () {
        const span = document.createElement('span')

        span.style.position = 'absolute'
        span.style.color = '#f52887'
        span.style.opacity = '0'
        addChildren(span, '\u2665')

        document.body.appendChild(span)
        return span
      }

      function growingHearts () {
        const ox = 0
        const oy = 80

        const w = document.body.clientWidth - ox - 200
        const h = document.body.clientHeight - oy - 200

        const newInterval = randomInt(200, 2000)

        window.setInterval(function () {
          const heart = createHeart()
          heart.style.fontSize = '0%'
          heart.style.left = randomInt(ox, ox + w) + 'px'
          heart.style.top = randomInt(oy, oy + h) + 'px'

          const growInterval = randomInt(10, 50)
          const size = randomInt(200, 2000)
          let i = 0
          const id = window.setInterval(function () {
            i += 20
            heart.style.fontSize = i + '%'

            if (i < size / 2) {
              heart.style.opacity = '1'
            } else {
              heart.style.opacity = (1 - (2 * i - size) / size) + ''
            }

            if (i >= size) {
              window.clearInterval(id)
              document.body.removeChild(heart)
            }
          }, growInterval)
        }, newInterval)
      }

      function risingHearts () {
        const ox = 0
        const oy = 80

        const w = document.body.clientWidth - ox - 200
        const h = document.body.clientHeight - oy - 200

        const newInterval = randomInt(200, 2000)

        window.setInterval(function () {
          let x = randomInt(ox, ox + w)
          const y = randomInt(oy + h - 100, oy + h)

          const heart = createHeart()
          heart.style.fontSize = randomInt(100, 2000) + '%'
          heart.style.left = x + 'px'
          heart.style.top = y + 'px'

          const riseInterval = randomInt(10, 50)
          const rise = randomInt(h / 4, h)
          let drift = randomInt(-1, 1)
          let i = 0
          const id = window.setInterval(function () {
            i++
            if (randomInt(1, 100) <= 1) {
              drift = (drift === randomInt(-1, 1) ? 1 : 0)
            }

            x = Math.min(Math.max(x + drift, ox), ox + w)

            heart.style.left = x + 'px'
            heart.style.top = (y - i) + 'px'

            if (i < rise / 4) {
              heart.style.opacity = (4 * i / rise) + ''
            } else if (i < rise / 2) {
              heart.style.opacity = '1'
            } else {
              heart.style.opacity = (1 - (2 * i - rise) / rise) + ''
            }

            if (i >= rise) {
              window.clearInterval(id)
              document.body.removeChild(heart)
            }
          }, riseInterval)
        }, newInterval)
      }

      function qtpiLetter () {
        const pLeft = '<p style="text-align: left">'
        const pCenter = '<p style="text-align: center">'
        const pRight = '<p style="text-align: right">'
        const pEnd = '</p>'

        const d = new Date()
        const meridiem = d.getHours() < 12 ? 'a.m.' : 'p.m.'

        if (d.getMinutes() === 14 && (d.getHours() === 3 ||
                                     d.getHours() === 15)) {
          return pLeft + 'Cutie Pai,' + pEnd + pCenter +
            'Happy <big style="font-family: serif">&pi;</big> ' +
            meridiem + pEnd + pRight + '&mdash; Susam' + pEnd
        }

        const letters = [
          pLeft + 'Cutie Pai,' + pEnd + pCenter +
            'I <span style="color: #f52887; font-size: 130%">&hearts;' +
            '</span> U!' + pEnd + pRight + '&mdash; Susam' + pEnd,

          pLeft + 'Cutie Pai,' + pEnd + pCenter +
            'I love you! <span style="color: #f52887;">' +
            '<span style="font-size: 60%">&hearts;</span>' +
            '<span style="font-size: 100%">&hearts;</span></span>' +
            pEnd + pRight + '&mdash; Susam' + pEnd,

            'world to me. <big style="color: #a53364">&#x263a;</big>' +
            pEnd + pRight + '&mdash; Susam' + pEnd
        ]

        return randomItem(letters)
      }

      function qtpi () {
        // Hide content and sidebar
        document.getElementById('content').style.display = 'none'

        const letterDiv = document.createElement('div')
        letterDiv.style.width = '50%'
        letterDiv.style.marginLeft = 'auto'
        letterDiv.style.marginRight = 'auto'
        letterDiv.style.borderColor = '#2e0854'
        letterDiv.style.borderWidth = '5px'
        letterDiv.style.borderStyle = randomItem(['solid', 'double', 'ridge', 'groove'])

        const fontSize = 32
        letterDiv.style.fontSize = fontSize + 'px'
        letterDiv.style.lineHeight = (1.5 * fontSize) + 'px'
        letterDiv.style.paddingLeft = fontSize + 'px'
        letterDiv.style.paddingRight = fontSize + 'px'
        letterDiv.style.color = '#2e0854'
        addChildren(letterDiv, qtpiLetter())

        const letter = qtpiLetter()
        letterDiv.innerHTML = letter

        const mainDiv = document.getElementById('main')
        mainDiv.appendChild(letterDiv)

        let verticalMargin = (window.innerHeight -
                              0.04 * window.innerWidth -
                              letterDiv.offsetHeight - 160) / 2

        if (verticalMargin <= 20) {
          verticalMargin = '2%'
        } else {
          verticalMargin = Math.round(verticalMargin) + 'px'
        }

        letterDiv.style.marginTop = verticalMargin
        letterDiv.style.marginBottom = verticalMargin

        randomItem([growingHearts, risingHearts, function () {}])()
        log('qtpi', letter.replace(/(<([^>]+)>)/ig, ' '))
      }
